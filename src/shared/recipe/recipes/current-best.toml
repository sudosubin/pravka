[buildPlans.Iosevkapravka]
family = "Pravka"
spacing = "term"
serifs = "sans"
noCvSs = true
exportGlyphNames = false
hintParams = [ "-a", "qqq" ]

[buildPlans.Iosevkapravka.widths.normal]
shape = 500
menu = 5
css = "normal"

[buildPlans.Iosevkapravka.metricOverride]
cap = 746
ascender = 746
xHeight = 550
leading = 1100

[buildPlans.Iosevkapravka.ligations]
inherits = "default-calt"
enables = [ "eqslasheq", "kern-dotty", "kern-bars", "llggeq", "--fast-chaining--" ]
disables = [ "slash-asterisk" ]

[buildPlans.Iosevkapravka.variants]
inherits = "ss08"

[buildPlans.Iosevkapravka.variants.design]
g = "double-storey"
a = "double-storey-serifless"
zero = "oval-dotted"
one = "no-base"
l = "zshaped"
tittle = "round"
q = "straight-serifless"
capital-r = "curly-serifless"
at = "threefold"
ampersand = "upper-open"

[buildPlans.Iosevkapravka.weights.regular]
shape = 425
menu = 400
css = 400

[buildPlans.Iosevkapravka.weights.semibold]
shape = 600
menu = 600
css = 600

[buildPlans.Iosevkapravka.weights.bold]
shape = 800
menu = 700
css = 700

[buildPlans.Iosevkapravka.weights.black]
shape = 900
menu = 900
css = 900

[buildPlans.Iosevkapravka.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.Iosevkapravka.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
