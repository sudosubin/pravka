name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Install fontforge
        run: |
          sudo apt-get update
          sudo apt-get install -y fontforge

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set up Iosevka source
        run: bun src/cli.ts build setup

      - name: Build Iosevka font
        run: bun src/cli.ts build font

      - name: Build plain TTF
        run: bun src/cli.ts release ttf --family plain

      - name: Patch Nerd Font
        run: bun src/cli.ts release ttf --family nerd

      - name: Convert OTF
        run: bun src/cli.ts release otf

      - name: Build WOFF2
        run: bun src/cli.ts release woff2

      - name: Package and checksums
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            bun src/cli.ts release package --version "${GITHUB_REF_NAME#v}"
          else
            bun src/cli.ts release package
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: pravka-release
          path: |
            dist/release/*.zip
            dist/release/SHA256SUMS
          if-no-files-found: error

  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: pravka-release
          path: dist/release

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/release/*.zip
            dist/release/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true
